{% extends "templates/web.html" %}

{% block title %}Văn Phòng — RVHG{% endblock %}

{% block head_include %}
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/vp/vp/css/vp.css?v={{ build_version }}-{{ asset_version }}">

<script>
window.VP_CONTEXT = {
  user: {{ vp_user | tojson }},
  fullName: {{ vp_full_name | tojson }},
  csrfToken: {{ csrf_token | tojson }},
  buildVersion: {{ build_version | tojson }},
  assetVersion: {{ asset_version | tojson }},
  assetBase: "/assets/vp/vp/js"
};
</script>

<!-- Import map MUST precede any <script type="module">. Remaps shared modules
     (resolved without ?v=) to cache-busted URLs. See frappe-portal-spa Luật vàng #1. -->
<script type="importmap">
{
  "imports": {
    "/assets/vp/vp/js/api.js":    "/assets/vp/vp/js/api.js?v={{ asset_version }}",
    "/assets/vp/vp/js/ui.js":     "/assets/vp/vp/js/ui.js?v={{ asset_version }}",
    "/assets/vp/vp/js/router.js": "/assets/vp/vp/js/router.js?v={{ asset_version }}"
  }
}
</script>

<style>
/* Page-scoped (only /vp loads this): strip ERPNext web chrome so the portal
   reads as a standalone app. */
.navbar, .web-footer, footer.footer, .navbar-expand, #navbar-collapse { display: none !important; }
html, body { margin: 0 !important; padding: 0 !important; background: #f7f2ec; }
main, .main-section, #page-content, .page_content, .page-content {
  padding: 0 !important; margin: 0 !important; max-width: none !important; width: 100% !important;
}
</style>
{% endblock %}

{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block page_content %}
<div id="vp-app" class="vp-app" data-booting="1">
  <div id="vp-boot" class="vp-boot">
    <div class="vp-loading-spinner"></div>
    <div class="vp-boot-text">Đang tải Văn Phòng…</div>
  </div>
</div>
<script type="module" src="/assets/vp/vp/js/main.js?v={{ asset_version }}"></script>
{% endblock %}
